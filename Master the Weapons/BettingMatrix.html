<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Betting Matrix | Master The Weapons</title>
    <link rel="icon" type="image/png" href="assets/flavicon.png">
    <style>
        :root { 
            --gold: #ffcc00; 
            --orange: #FF6600; 
            --bg: #0a0a0a; 
            --card: #161616; 
            --text: #eee; 
        }
        body { 
            font-family: 'Arial Narrow', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            background-image: linear-gradient(rgba(0,0,0,0.88), rgba(0,0,0,0.88)), url('1.jpg');
            background-size: cover; 
            background-attachment: fixed;
        }
        nav { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--orange); }
        nav a { color: white; text-decoration: none; margin: 0 15px; text-transform: uppercase; font-weight: bold; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        h1 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        .matrix-card, .advice-box { 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid #333; 
            margin-bottom: 30px; 
            padding: 25px;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #222; color: var(--gold); padding: 16px; text-align: left; }
        td { padding: 14px; border-bottom: 1px solid #333; }

        .tag { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 4px; font-weight: bold; }
        .status-win { color: #4caf50; font-weight: bold; }

        .slider-container {
            margin: 20px 0;
            padding: 20px;
            background: #1a1a1a;
            border: 1px solid var(--gold);
            border-radius: 8px;
        }
        label { color: var(--gold); font-weight: bold; display: block; margin-bottom: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--gold); cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="Setup.html">Setup</a>
    <a href="ScoutingMatrix.html">Scouting Matrix</a>
    <a href="BettingMatrix.html">Betting Matrix</a>
    <a href="FighterAssesment.html">Fighter Assessment</a>
    <a href="CoachAssesment.html">Coach Assessment</a>
</nav>

<div class="container">
    <h1>🔥 MMA STRATEGIC BETTING MATRIX v2.1</h1>

    <div class="matrix-card">
        <h2 style="color:var(--gold); text-align:center;">WEAPONS + X-FACTOR COMBINED ANALYSIS</h2>
        
        <div class="slider-container">
            <label>X-Factor Weight: <span id="weightValue">35</span>% 
                <span style="color:#aaa; font-size:0.9rem; font-weight: normal; margin-left: 10px;">
                    (Adjusting importance of Momentum/Physical/Spot)
                </span>
            </label>
            <input type="range" id="xfWeight" min="5" max="95" value="35" step="5">
        </div>

        <table id="summaryTable">
            <thead>
                <tr>
                    <th>Core Metric</th>
                    <th>Fighter A</th>
                    <th>Fighter B</th>
                    <th>Weighted Edge</th>
                </tr>
            </thead>
            <tbody id="bucketBody"></tbody>
        </table>
    </div>

    <div class="advice-box">
        <h3 style="margin-top:0; color:var(--gold);">TACTICAL BETTING RECOMMENDATION</h3>
        <div id="adviceContent">Crunching numbers...</div>
    </div>
</div>

<script>
    function analyzeBetting() {
        const nameA = localStorage.getItem('MOW_FighterA_Name') || 'Fighter A';
        const nameB = localStorage.getItem('MOW_FighterB_Name') || 'Fighter B';
        
        const weaponsRaw = localStorage.getItem('MOW_AI_Scores') || "";
        const xfRaw = localStorage.getItem('MOW_XFactor_Scores') || "";

        let weaponAvgA = 5.0, weaponAvgB = 5.0;
        let xfAvgA = 5.0, xfAvgB = 5.0;

        // --- WEAPON PARSING ---
        if (weaponsRaw.trim() !== "") {
            const lines = weaponsRaw.trim().split('\n');
            let totalA = 0, totalB = 0, count = 0;
            lines.forEach(line => {
                if (!line.includes(',')) return;
                const cols = line.split(',');
                if (cols.length < 7) return; 
                
                // Average the T, A, E scores for each fighter per weapon
                const aVal = (parseFloat(cols[1]) + parseFloat(cols[2]) + parseFloat(cols[3])) / 3;
                const bVal = (parseFloat(cols[4]) + parseFloat(cols[5]) + parseFloat(cols[6])) / 3;
                
                if (!isNaN(aVal) && !isNaN(bVal)) {
                    totalA += aVal; totalB += bVal; count++;
                }
            });
            if (count > 0) {
                weaponAvgA = totalA / count;
                weaponAvgB = totalB / count;
            }
        }

        // --- X-FACTOR PARSING ---
        if (xfRaw.trim() !== "") {
            const lines = xfRaw.trim().split('\n');
            let totalA = 0, totalB = 0, count = 0;
            lines.forEach(line => {
                const cols = line.split(',');
                if (cols.length >= 3) {
                    const a = parseFloat(cols[1]);
                    const b = parseFloat(cols[2]);
                    if (!isNaN(a) && !isNaN(b)) {
                        totalA += a; totalB += b; count++;
                    }
                }
            });
            if (count > 0) {
                xfAvgA = totalA / count;
                xfAvgB = totalB / count;
            }
        }

        // --- WEIGHTED MATH ---
        const currentSliderVal = document.getElementById('xfWeight').value;
        document.getElementById('weightValue').textContent = currentSliderVal;

        const xfWeight = parseFloat(currentSliderVal) / 100;
        const weaponWeight = 1 - xfWeight;

        const finalA = (weaponAvgA * weaponWeight) + (xfAvgA * xfWeight);
        const finalB = (weaponAvgB * weaponWeight) + (xfAvgB * xfWeight);

        // --- RENDER TABLE ---
        const bucketsHTML = `
            <tr>
                <td><strong>Technical Skills (Weapons)</strong></td>
                <td>${weaponAvgA.toFixed(1)}</td>
                <td>${weaponAvgB.toFixed(1)}</td>
                <td>${weaponAvgA > weaponAvgB ? nameA : nameB} (+${Math.abs(weaponAvgA - weaponAvgB).toFixed(1)})</td>
            </tr>
            <tr>
                <td><strong>Intangibles (X-Factor)</strong></td>
                <td>${xfAvgA.toFixed(1)}</td>
                <td>${xfAvgB.toFixed(1)}</td>
                <td>${xfAvgA > xfAvgB ? nameA : nameB} (+${Math.abs(xfAvgA - xfAvgB).toFixed(1)})</td>
            </tr>
            <tr style="background: #222; border-top: 2px solid var(--gold);">
                <td><strong style="color:var(--gold)">FINAL AGGREGATE</strong></td>
                <td><strong style="color:var(--gold)">${finalA.toFixed(2)}</strong></td>
                <td><strong style="color:var(--gold)">${finalB.toFixed(2)}</strong></td>
                <td><span class="tag">${finalA > finalB ? nameA : nameB}</span></td>
            </tr>
        `;
        document.getElementById('bucketBody').innerHTML = bucketsHTML;

        // --- RECOMMENDATION ENGINE ---
        const diff = Math.abs(finalA - finalB);
        let winner = finalB > finalA ? nameB : nameA;
        let confidence = diff > 1.0 ? "HIGH" : (diff > 0.4 ? "MEDIUM" : "LOW/VOLATILE");

        let recHtml = `
            <p><span class="tag">SIGNAL: ${confidence} CONFIDENCE</span> <span class="status-win">${winner.toUpperCase()} IS THE PLAY</span></p>
            <p>Weighting strategy: ${ (weaponWeight*100).toFixed(0) }% Skill / ${ (xfWeight*100).toFixed(0) }% Circumstance</p>
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            <strong>Execution:</strong><br>
            • Primary: ${winner} Moneyline<br>
            • Alt: ${diff > 0.8 ? winner + " inside the distance" : winner + " by decision"}<br>
            • Logic: ${winner} holds a ${diff.toFixed(2)} unit advantage at this risk weight.
        `;

        document.getElementById('adviceContent').innerHTML = recHtml;
    }

    // --- INITIALIZE ---
    document.addEventListener('DOMContentLoaded', () => {
        const slider = document.getElementById('xfWeight');
        
        // Listen for both 'input' (live drag) and 'change' (on release)
        slider.addEventListener('input', analyzeBetting);
        
        // Initial run
        analyzeBetting();
    });
</script>
</body>
</html>
